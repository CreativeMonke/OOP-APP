name: Build & Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Builds the app and creates/updates the GitHub release with the
      # bundles attached. tauri-action detects the bundle paths itself, so
      # there are no globs to get wrong. Both matrix jobs publish to the
      # same tag: the first creates the release, the second appends to it.
      - name: Build & release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: OOP Academy v__VERSION__
          releaseBody: Automated build from main branch.
          releaseDraft: false
          prerelease: false

  bump:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Bump version for next iteration
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          IFS='.' read -ra PARTS <<< "$VERSION"
          NEW_VERSION="${PARTS[0]}.${PARTS[1]}.$((PARTS[2] + 1))"

          node -e "
            const fs = require('fs');
            const p = './src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            c.version = '$NEW_VERSION';
            fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');
          "

          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push
