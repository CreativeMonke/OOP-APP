name: Build & Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            bundle-suffix: dmg
          - os: windows-latest
            bundle-suffix: exe
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build Tauri app
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          createRelease: false

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: OOP_Academy-${{ matrix.os }}-${{ matrix.bundle-suffix }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "tag=$(node -p "require('./src-tauri/tauri.conf.json').version")" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4

      - name: Create release & upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.tag }}
          name: OOP Academy v${{ steps.version.outputs.tag }}
          body: Automated build from main branch.
          files: OOP_Academy-*/
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bump:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Bump version for next iteration
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          IFS='.' read -ra PARTS <<< "$VERSION"
          NEW_VERSION="${PARTS[0]}.${PARTS[1]}.$((PARTS[2] + 1))"

          node -e "
            const fs = require('fs');
            const p = './src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            c.version = '$NEW_VERSION';
            fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');
          "

          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push
