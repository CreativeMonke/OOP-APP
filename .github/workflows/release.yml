name: Build & Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build Tauri app & create release
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "OOP Academy v__VERSION__"
          releaseBody: "Automated build from main branch."
          releaseDraft: false
          prerelease: false

      - name: Bump version for next iteration
        if: success()
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          IFS='.' read -ra PARTS <<< "$VERSION"
          NEW_VERSION="${PARTS[0]}.${PARTS[1]}.$((PARTS[2] + 1))"

          node -e "
            const fs = require('fs');
            const p = './src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            c.version = '$NEW_VERSION';
            fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');
          "
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push
